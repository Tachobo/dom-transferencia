<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Registro de Tareas</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div>
                    <h1 class="header__title">Panel de Administración</h1>
                    <p class="header__subtitle">Gestión global de tareas y usuarios</p>
                </div>
                <button id="btnAdminLogout" class="btn btn--danger">Cerrar Sesión</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px; border-bottom: 2px solid var(--color-gray-200); padding-bottom: 10px;">
                <button id="tabTasks" class="btn btn--primary">Gestión de Tareas</button>
                <button id="tabUsers" class="btn" style="background-color: var(--color-gray-200); color: var(--color-text-primary);">Gestión de Usuarios</button>
            </div>
        </header>

<section id="tasksSection" class="admin-section">
            
            <div class="admin-toolbar">
                <div class="admin-toolbar__filters">
                    <input type="text" id="adminSearchTask" class="form__input" placeholder="Buscar por descripción o ID...">
                    <select id="adminFilterStatus" class="form__input">
                        <option value="all">Todos los estados</option>
                        <option value="pendiente">Pendientes</option>
                        <option value="completada">Completadas</option>
                    </select>
                </div>
                <button id="btnNewGlobalTask" class="btn btn--primary">➕ Nueva Tarea Global</button>
            </div>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Usuario Asignado</th>
                            <th>Descripción</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="adminTasksTableBody">
                        <tr>
                            <td colspan="6" class="table-empty">Cargando datos del sistema...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </section>
        
    </div>

    <div id="notification-container" class="notification-container"></div>

    <script src="/src/admin.js" type="module"></script>
</body>
</html>
